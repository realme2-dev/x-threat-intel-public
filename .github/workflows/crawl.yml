name: X Threat Intel Crawler

on:
  schedule:
    # 오전 7시 KST = UTC 22:00 (전날)
    - cron: '0 22 * * *'
    # 오후 5시 KST = UTC 08:00
    - cron: '0 8 * * *'
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LLM_BACKEND: "gemini"
          LLM_FALLBACK_ORDER: "groq,openai"
          ENABLE_LLM: "true"
          PYTHONUTF8: "1"
        run: |
          python main.py --llm --workers 3

      - name: Generate HTML report
        run: |
          PYTHONUTF8=1 python generate_report_html.py

      - name: Commit crawled data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master
          git add data/_report_*.json docs/index.html
          if git diff --cached --quiet; then
            echo "변경 없음, 커밋 건너뜀"
          else
            git commit -m "data: $(date -u +'%Y-%m-%d %H:%M UTC') 크롤링 결과"
            git push origin master
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
